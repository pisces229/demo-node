# Lefthook config
pre-commit:
  only_branches:
    - main
    - develop
  # exclude_branches:
  #     - feature/
  parallel: true
  commands:
    check:
      root: "."
      run: echo "pwd" & pwd & exit 1
    app1-format:
      glob: "**/*.{js,ts}"
      # pnpm -C app1 run lint --fix {staged_files}
      # pnpm -C app1 run format --write {staged_files}
      # && git add {staged_files}
      run: pnpm -C app1 run format
